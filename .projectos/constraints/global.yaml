# ProjectOS - Global Architecture Constraints

version: v1.0.0
level: GLOBAL

rules:
  - id: anti_god_file
    description: "No single file shall exceed 400 lines of code. Controllers and Services must be strictly modularized."
    enforcement: BLOCKING
  
  - id: universal_engine_contract
    description: "Every internal service layer must emit Confidence Scores and Trace Metadata for observability."
    enforcement: BLOCKING

  - id: ddd_boundaries
    description: "Modules in the backend cannot import entities from other modules. They must communicate via DTOs and Interfaces."
    enforcement: WARNING
